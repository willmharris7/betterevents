name: Build & Release Electron App

on:
  push:
    tags:
      - 'v*'  # Triggers on version tags like v1.0.0

permissions:
  contents: write        # Needed to create releases
  id-token: write        # Needed for Sigstore signing (attestation)
  attestations: write    # Needed to persist attestations

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --publish never

      # Collect the built artifacts into a known location
      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp dist/*.dmg artifacts/ || true

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p artifacts
          cp dist/*.exe artifacts/ || true

      # Generate attestation for each artifact
      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: 'artifacts/*'

      # Upload as workflow artifacts (available in the Actions tab)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: artifacts/

      # Attach to the GitHub Release
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true